# CIES Experiment Configuration
# Explainable ML for Credit Card Fraud Detection under Data Imbalance

data:
  data_path: "data/raw/creditcard.csv"
  target_column: "Class"
  test_size: 0.2
  random_state: 42

# Scaling: RobustScaler on Amount & Time only (V1–V28 already PCA)
preprocessing:
  scaler: "robust"
  scale_columns: ["Amount", "Time"]

# CIES Parameters (Văduva et al., 2026)
cies:
  n_instances: 100        # N — number of test instances for model-level CIES
  n_neighbors: 20         # K — perturbed neighbors per instance
  noise_level: 0.03       # ε — multiplicative Gaussian noise
  sensitivity_epsilons:   # ε values for sensitivity analysis
    - 0.01
    - 0.03
    - 0.05
    - 0.10

# Model hyperparameters (CIES paper Section 3.8)
# These can be overridden by Optuna-tuned parameters
models:
  RF:
    n_estimators: 200
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1

  XGB:
    n_estimators: 244
    learning_rate: 0.085084
    max_depth: 8
    subsample: 0.676336
    colsample_bytree: 0.707718
    min_child_weight: 1
    scale_pos_weight: 27.153399
    random_state: 42
    eval_metric: "aucpr"

  CatBoost:
    iterations: 535
    depth: 5
    learning_rate: 0.037576
    l2_leaf_reg: 0.321827
    random_seed: 42
    verbose: 0

  LR:
    max_iter: 1000
    random_state: 42

# Conditions (imbalance handling)
conditions:
  - C0   # Class-weighting baseline
  - C1   # SMOTE
  - C2   # SMOTE-ENN
